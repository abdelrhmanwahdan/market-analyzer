name: Market Analyzer — Fetch

on:
  schedule:
    - cron: '30 6 * * *'    # 06:30 UTC daily — pre-EGX open (8:30am Cairo)
    - cron: '30 21 * * 0-4' # 21:30 UTC Sun-Thu — after US close (11:30pm Cairo)
  workflow_dispatch: {}     # Manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -r analyzer/requirements.txt python-dotenv

      # ── Fetch all market data → output/latest_data.json ──────────────────────
      - name: Fetch market data
        run: python analyzer/main.py --fetch

      # ── Update PNL for any open signals ──────────────────────────────────────
      - name: Update PNL
        run: python analyzer/main.py --update-pnl

      # ── Keep the output file as an artifact for 7 days ───────────────────────
      - name: Upload market data artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-data-${{ github.run_number }}
          path: analyzer/output/latest_data.json
          retention-days: 7
